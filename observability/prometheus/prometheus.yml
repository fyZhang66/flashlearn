global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "flashlearn"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:3000"]
        labels:
          service: "flashlearn"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
