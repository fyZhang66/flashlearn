apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# dev uses the locally-built image loaded into kind
images:
  - name: flashlearn-app
    newName: flashlearn-app
    newTag: local

patches:
  - path: replicas-patch.yaml
    target:
      kind: Deployment
      name: app
  # HPA's minReplicas=2 would otherwise fight the "1 replica in dev"
  # intent — drop the HPA from the dev overlay entirely.
  - patch: |-
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: app
    target:
      kind: HorizontalPodAutoscaler
      name: app
