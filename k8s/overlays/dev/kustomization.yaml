apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# dev uses the locally-built image loaded into kind
images:
  - name: flashlearn-app
    newName: flashlearn-app
    newTag: local

patches:
  - path: replicas-patch.yaml
    target:
      kind: Deployment
      name: app
