apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flashlearn

resources:
  - namespace.yaml
  - postgres-secret.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - app-configmap.yaml
  - app-deployment.yaml
  - app-service.yaml
  - app-hpa.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: flashlearn
    includeSelectors: true
