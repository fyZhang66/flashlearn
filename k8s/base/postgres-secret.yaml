# Demo credentials. In a real setup these would come from a sealed-secret,
# external-secrets operator, or your cloud's secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: flashlearn
type: Opaque
stringData:
  POSTGRES_USER: flashlearn
  POSTGRES_PASSWORD: flashlearn
  POSTGRES_DB: flashlearn
  DATABASE_URL: postgres://flashlearn:flashlearn@postgres:5432/flashlearn
