apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: flashlearn
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: flashlearn-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: flashlearn-app:local
          imagePullPolicy: IfNotPresent
          command: ["node", "scripts/migrate.js"]
          env:
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
