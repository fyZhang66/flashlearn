name: CD

# Triggered after CI finishes successfully on main. Runs on a self-hosted
# runner installed on the developer's laptop so it can reach the local
# kind cluster. See docs/CICD.md for runner registration.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    env:
      CLUSTER_CONTEXT: kind-flashlearn
      NAMESPACE: flashlearn
      DEPLOYMENT: app
      OVERLAY: k8s/overlays/prod
    steps:
      - name: Check out the built commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve image
        id: img
        run: |
          # `${VAR,,}` is bash 4+; macOS ships bash 3.2 on self-hosted runners,
          # so lowercase via tr instead.
          owner=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          sha="${{ github.event.workflow_run.head_sha }}"
          echo "image=ghcr.io/${owner}/flashlearn:${sha}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull image
        run: docker pull "${{ steps.img.outputs.image }}"

      - name: Load into kind
        run: kind load docker-image "${{ steps.img.outputs.image }}" --name flashlearn

      - name: Pin image tag in overlay
        # Overwrite the checkout's kustomization.yaml so the generated
        # manifests reference this exact SHA. The edit is ephemeral (the
        # runner workspace is discarded); the committed file stays at
        # `:latest`. Using perl instead of sed because BSD sed on the
        # macOS self-hosted runner mis-parses `sed -i -E`.
        working-directory: ${{ env.OVERLAY }}
        run: |
          perl -i -pe 's#(newTag:).*#$1 ${{ steps.img.outputs.sha }}#' kustomization.yaml
          cat kustomization.yaml

      - name: Reconcile manifests
        # Applies Namespace, Secret, ConfigMap, Postgres StatefulSet +
        # Service, app Deployment (with migrate initContainer), Service,
        # HPA, and Ingress. The Deployment won't become Ready until the
        # initContainer has successfully applied migrations.
        run: |
          kubectl --context "$CLUSTER_CONTEXT" apply -k "$OVERLAY"

      - name: Annotate rollout with SHA
        run: |
          kubectl --context "$CLUSTER_CONTEXT" -n "$NAMESPACE" annotate \
            "deployment/$DEPLOYMENT" \
            "kubernetes.io/change-cause=CD deploy ${{ steps.img.outputs.sha }}" \
            --overwrite

      - name: Wait for rollout
        run: |
          kubectl --context "$CLUSTER_CONTEXT" -n "$NAMESPACE" \
            rollout status "deployment/$DEPLOYMENT" --timeout=300s

      - name: Summarize
        if: always()
        run: |
          echo "### Deploy result" >> "$GITHUB_STEP_SUMMARY"
          echo "- image: \`${{ steps.img.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- status: $(kubectl --context "$CLUSTER_CONTEXT" -n "$NAMESPACE" get deploy "$DEPLOYMENT" -o jsonpath='{.status.conditions[-1].message}')" >> "$GITHUB_STEP_SUMMARY"
